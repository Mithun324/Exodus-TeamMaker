name: .NET Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore TeamMaker_WebApp.sln

    - name: Build
      run: dotnet build TeamMaker_WebApp.sln --configuration Release --no-restore

    - name: Test
      # Runs tests if you add a test project in the future
      run: dotnet test TeamMaker_WebApp.sln --configuration Release --no-build --verbosity normal
